name: Publish Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      GITHUB_ACTOR: ${{ github.actor }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Verify tag matches build version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          tag_version="${GITHUB_REF_NAME#v}"
          build_version="$(sed -nE 's/^[[:space:]]*version = \"([^\"]+)\"$/\1/p' build.gradle.kts | head -n1)"

          if [[ -z "${build_version}" ]]; then
            echo "Could not read the checked-in version literal from build.gradle.kts." >&2
            exit 1
          fi

          if [[ "${tag_version}" != "${build_version}" ]]; then
            echo "Release tag ${GITHUB_REF_NAME} does not match build.gradle.kts version ${build_version}." >&2
            exit 1
          fi

          echo "build_version=${build_version}" >> "${GITHUB_OUTPUT}"

      - name: Publish to GitHub Packages Maven
        run: ./gradlew publish

      - name: Report published package links
        shell: bash
        env:
          BUILD_VERSION: ${{ steps.version.outputs.build_version }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          packages=(
            org.budgetanalyzer.spring-platform
            org.budgetanalyzer.spring-cloud-platform
            org.budgetanalyzer.service-core
            org.budgetanalyzer.service-web
          )

          echo "Published service-common ${BUILD_VERSION} packages:"
          {
            echo "## Published service-common ${BUILD_VERSION}"
            echo
            echo "| Artifact | GitHub Packages |"
            echo "| --- | --- |"
          } >> "${GITHUB_STEP_SUMMARY}"

          for package_name in "${packages[@]}"; do
            package_url="$(
              gh api --paginate "/orgs/budgetanalyzer/packages/maven/${package_name}/versions" \
                --jq ".[] | select(.name == \"${BUILD_VERSION}\") | .html_url" \
                | head -n1
            )"

            if [[ -z "${package_url}" ]]; then
              echo "Could not resolve GitHub Packages URL for ${package_name} ${BUILD_VERSION}." >&2
              exit 1
            fi

            echo "- ${package_name}: ${package_url}"
            echo "| ${package_name} | [${package_url}](${package_url}) |" >> "${GITHUB_STEP_SUMMARY}"
          done
